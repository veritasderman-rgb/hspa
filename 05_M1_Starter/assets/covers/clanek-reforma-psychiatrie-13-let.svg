<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Reforma psychiatrie po třinácti letech: co dotáhla a co padá s každou změnou vlády. Bilance Petra Winklera">
  <defs>
    <style>
      .root { font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif; }
      .kicker { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; fill: #5f4a8c; }
      .number { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.06em; fill: #5f574e; }
      .title { font-family: 'Source Serif 4', Georgia, serif; font-weight: 700; fill: #1f1a14; letter-spacing: -0.5px; }
      .caption { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #5f574e; font-style: italic; }
      .meta { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; fill: #5f574e; }
      .brand { font-family: 'Source Serif 4', Georgia, serif; font-size: 22px; font-weight: 700; fill: #1f1a14; }
      .brand em { font-style: italic; font-weight: 400; }
      .viz-label { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 500; fill: #1f1a14; }
      .viz-value { font-family: 'Source Serif 4', Georgia, serif; font-size: 22px; font-weight: 700; fill: #1f1a14; font-variant-numeric: tabular-nums; }
      .viz-sub { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #5f574e; letter-spacing: 0.04em; text-transform: uppercase; }
      .viz-title { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; fill: #5f574e; }
      
    @media (max-width: 768px), (prefers-reduced-motion: no-preference) {
      .accent-bar { transform-origin: 1150px 580px; animation: barGrow 1.2s cubic-bezier(.22,.61,.36,1) both; }
      .title-underline { stroke-dasharray: 280; stroke-dashoffset: 280; animation: drawIn 0.8s ease-out 0.6s forwards; }
      .pulse-dot { animation: pulse 3.4s ease-in-out 1.5s infinite; }
      .viz-bar { transform-origin: left center; animation: barGrowX 1.1s cubic-bezier(.22,.61,.36,1) both; }
      .viz-bar-1 { animation-delay: 0.4s; }
      .viz-bar-2 { animation-delay: 0.6s; }
      .viz-bar-3 { animation-delay: 0.8s; }
      .viz-bar-4 { animation-delay: 1.0s; }
      .viz-donut-segment { stroke-dasharray: var(--len) var(--circ); stroke-dashoffset: var(--len); animation: drawArc 1.2s ease-out 0.5s forwards; }
      .viz-timeline-dot { transform-origin: center; animation: dotPop 0.5s cubic-bezier(.34,1.56,.64,1) both; }
      .viz-timeline-dot-1 { animation-delay: 0.5s; }
      .viz-timeline-dot-2 { animation-delay: 0.75s; }
      .viz-timeline-dot-3 { animation-delay: 1.0s; }
      .viz-timeline-dot-4 { animation-delay: 1.25s; }
      .viz-timeline-line { stroke-dasharray: 400; stroke-dashoffset: 400; animation: drawIn 1.2s ease-out 0.3s forwards; }
    }
    @media (prefers-reduced-motion: reduce) {
      .accent-bar, .title-underline, .pulse-dot, .viz-bar, .viz-donut-segment, .viz-timeline-dot, .viz-timeline-line { animation: none !important; }
      .title-underline, .viz-timeline-line { stroke-dashoffset: 0; }
      .viz-donut-segment { stroke-dashoffset: 0; }
    }
    @keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes barGrowX { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes drawIn { to { stroke-dashoffset: 0; } }
    @keyframes drawArc { to { stroke-dashoffset: 0; } }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.4); } }
    @keyframes dotPop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
    </style>
    <pattern id="grain" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="30" r="0.6" fill="#1f1a14" opacity="0.06"/>
      <circle cx="80" cy="70" r="0.5" fill="#1f1a14" opacity="0.05"/>
      <circle cx="50" cy="100" r="0.7" fill="#1f1a14" opacity="0.07"/>
      <circle cx="100" cy="20" r="0.4" fill="#1f1a14" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fbf8f1"/>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- Top border (editorial rule) -->
  <line x1="80" y1="60" x2="660" y2="60" stroke="#1f1a14" stroke-width="2"/>

  <!-- Kicker row: tag + article number -->
  <g class="root">
    <text x="80" y="90" class="kicker">
      <tspan>Duševní zdraví</tspan>
      <tspan dx="14" fill="#5f574e" letter-spacing="0.12em" font-weight="500">#18</tspan>
    </text>
    <circle class="pulse-dot" cx="62" cy="84" r="5" fill="#5f4a8c"/>
  </g>

  <!-- Headline -->
  <g class="root">
    <text class="title" x="80" y="160" font-size="36">
      <tspan x="80" dy="0">Reforma</tspan><tspan x="80" dy="38">psychiatrie po</tspan><tspan x="80" dy="38">třinácti letech:</tspan><tspan x="80" dy="38">co dotáhla a co</tspan><tspan x="80" dy="38">padá s každou</tspan><tspan x="80" dy="38">změnou vlády.</tspan><tspan x="80" dy="38">Bilance Petra</tspan><tspan x="80" dy="38">Winklera</tspan>
    </text>
    <line class="title-underline"
          x1="80" y1="448"
          x2="280" y2="448"
          stroke="#5f4a8c" stroke-width="4" stroke-linecap="round"/>
    
  </g>

  <!-- Data viz panel (volitelně) -->
  <g><text x="670" y="144" class="viz-title">13 let reformy psychiatrické péče</text><line class="viz-timeline-line" x1="690" y1="188" x2="1070" y2="188" stroke="#5f574e" stroke-width="2" opacity="0.5"/>
      <circle class="viz-timeline-dot viz-timeline-dot-1"
              cx="690" cy="188" r="6"
              fill="#1f1a14" stroke="#fbf8f1" stroke-width="3"/>
      <text x="690" y="170" text-anchor="middle" class="viz-value" font-size="16">2013</text>
      <text x="690" y="218" text-anchor="middle" class="viz-sub" style="text-transform:none;letter-spacing:0;font-size:11px;">
        <tspan x="690" dy="0">Start reformy MZ</tspan><tspan x="690" dy="14">ČR</tspan>
      </text>
    
      <circle class="viz-timeline-dot viz-timeline-dot-2"
              cx="816.6666666666666" cy="188" r="9"
              fill="#5f4a8c" stroke="#fbf8f1" stroke-width="3"/>
      <text x="816.6666666666666" y="170" text-anchor="middle" class="viz-value" font-size="16">2018</text>
      <text x="816.6666666666666" y="218" text-anchor="middle" class="viz-sub" style="text-transform:none;letter-spacing:0;font-size:11px;">
        <tspan x="816.6666666666666" dy="0">První CDZ otevřeno</tspan>
      </text>
    
      <circle class="viz-timeline-dot viz-timeline-dot-3"
              cx="943.3333333333334" cy="188" r="6"
              fill="#1f1a14" stroke="#fbf8f1" stroke-width="3"/>
      <text x="943.3333333333334" y="170" text-anchor="middle" class="viz-value" font-size="16">2022</text>
      <text x="943.3333333333334" y="218" text-anchor="middle" class="viz-sub" style="text-transform:none;letter-spacing:0;font-size:11px;">
        <tspan x="943.3333333333334" dy="0">Hodnocení WHO</tspan>
      </text>
    
      <circle class="viz-timeline-dot viz-timeline-dot-4"
              cx="1070" cy="188" r="9"
              fill="#5f4a8c" stroke="#fbf8f1" stroke-width="3"/>
      <text x="1070" y="170" text-anchor="middle" class="viz-value" font-size="16">2026</text>
      <text x="1070" y="218" text-anchor="middle" class="viz-sub" style="text-transform:none;letter-spacing:0;font-size:11px;">
        <tspan x="1070" dy="0">Krize dětské</tspan><tspan x="1070" dy="14">psychiatrie</tspan>
      </text>
    </g>

  <!-- Bottom: branding + date -->
  <g class="root">
    <line x1="80" y1="570" x2="1060" y2="570" stroke="rgba(31,26,20,0.13)" stroke-width="1"/>
    <text x="80" y="598" class="brand">
      <tspan font-weight="700">HSPA</tspan> <tspan font-style="italic" font-weight="400">monitor</tspan>
    </text>
    <text x="1060" y="598" text-anchor="end" class="meta">7. května 2026</text>
  </g>

  <!-- Right accent bar (animovaná) -->
  <rect class="accent-bar"
        x="1144" y="50"
        width="12" height="530"
        fill="#5f4a8c" rx="2"/>
</svg>
