<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Strukturální deficit zdravotního pojištění 2026. Proč se nůžky rozevírají a co je zastaví">
  <defs>
    <style>
      .dh-kicker { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; fill: #a05a08; }
      .dh-title { font-family: 'Source Serif 4', Georgia, serif; font-weight: 700; fill: #1f1a14; letter-spacing: -0.3px; line-height: 1.1; }
      .dh-brand { font-family: 'Source Serif 4', Georgia, serif; font-size: 20px; font-weight: 700; fill: #1f1a14; }
      .dh-date { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; fill: #5f574e; }
      .viz-title { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; fill: #5f574e; }
      .viz-label { font-family: 'Inter', system-ui, sans-serif; font-size: 15px; font-weight: 600; fill: #1f1a14; }
      .viz-value { font-family: 'Source Serif 4', Georgia, serif; font-size: 28px; font-weight: 700; fill: #1f1a14; font-variant-numeric: tabular-nums; }
      .viz-sub { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #5f574e; letter-spacing: 0.03em; }
      
    @media (max-width: 768px), (prefers-reduced-motion: no-preference) {
      .dh-headline { animation: fadeIn 0.7s ease-out 0.3s both; }
      .dh-divider { transform-origin: top; animation: lineDown 0.8s ease-out both; }
      .viz-bar { transform-origin: left center; animation: barGrowX 1.1s cubic-bezier(.22,.61,.36,1) both; }
      .viz-bar-1 { animation-delay: 0.5s; }
      .viz-bar-2 { animation-delay: 0.7s; }
      .viz-donut-segment { stroke-dasharray: var(--len) var(--circ); stroke-dashoffset: var(--len); animation: drawArc 1.2s ease-out 0.5s forwards; }
      .viz-timeline-dot { transform-origin: center; animation: dotPop 0.5s cubic-bezier(.34,1.56,.64,1) both; }
      .viz-timeline-dot-1 { animation-delay: 0.5s; }
      .viz-timeline-dot-2 { animation-delay: 0.75s; }
      .viz-timeline-dot-3 { animation-delay: 1.0s; }
      .viz-timeline-dot-4 { animation-delay: 1.25s; }
      .viz-timeline-line { stroke-dasharray: 600; stroke-dashoffset: 600; animation: drawIn 1.2s ease-out 0.3s forwards; }
    }
    @media (prefers-reduced-motion: reduce) {
      .dh-headline, .dh-divider, .viz-bar, .viz-donut-segment, .viz-timeline-dot, .viz-timeline-line { animation: none !important; }
      .viz-donut-segment, .viz-timeline-line { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes lineDown { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes barGrowX { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes drawArc { to { stroke-dashoffset: 0; } }
    @keyframes drawIn { to { stroke-dashoffset: 0; } }
    @keyframes dotPop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
    </style>
  </defs>

  <!-- Cream background s subtle texturou na pravé straně -->
  <rect width="1200" height="630" fill="#fbf8f1"/>
  <rect x="696" y="0" width="504" height="630" fill="#f3eee2"/>

  <!-- Vertical divider mezi viz a textem -->
  <line class="dh-divider" x1="696" y1="50" x2="696" y2="590" stroke="#1f1a14" stroke-width="2"/>

  <!-- Top tag pill nad viz -->
  <text x="60" y="82" class="dh-kicker">
    <tspan>Financování</tspan>
    <tspan dx="14" fill="#5f574e" letter-spacing="0.1em" font-weight="500">#30</tspan>
  </text>

  <!-- Veliká viz -->
  <g><text x="60" y="104" class="viz-title">Nůžky se rozevírají</text>
      <text x="60" y="233.5" class="viz-label">Výdaje na péči</text>
      <text x="60" y="251.5" class="viz-sub">meziroční růst 2026</text>
      <rect class="viz-bar viz-bar-1"
            x="280" y="224"
            width="246" height="28"
            fill="#a05a08" rx="2" opacity="1"/>
      <text x="538" y="246" class="viz-value" fill="#a05a08">6,4 %</text>
    
      <text x="60" y="339.5" class="viz-label">Příjmy z pojistného</text>
      <text x="60" y="357.5" class="viz-sub">meziroční růst 2026</text>
      <rect class="viz-bar viz-bar-2"
            x="280" y="330"
            width="211" height="28"
            fill="#5f574e" rx="2" opacity="0.55"/>
      <text x="503" y="352" class="viz-value" fill="#1f1a14">5,5 %</text>
    </g>

  <!-- Headline pravá strana -->
  <g class="dh-headline">
    <text class="dh-title" x="736" y="187" font-size="28">
      <tspan x="736" dy="0">Strukturální</tspan><tspan x="736" dy="31">deficit</tspan><tspan x="736" dy="31">zdravotního</tspan><tspan x="736" dy="31">pojištění 2026.</tspan><tspan x="736" dy="31">Proč se nůžky</tspan><tspan x="736" dy="31">rozevírají a co je</tspan><tspan x="736" dy="31">zastaví</tspan>
    </text>
    <line x1="736" y1="401"
          x2="856" y2="401"
          stroke="#a05a08" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Bottom right: brand + date -->
  <g>
    <text x="736" y="580" class="dh-brand">
      <tspan font-weight="700">HSPA</tspan> <tspan font-style="italic" font-weight="400">monitor</tspan>
    </text>
    <text x="736" y="602" class="dh-date">8. května 2026</text>
  </g>
</svg>
