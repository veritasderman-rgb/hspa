<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Strukturální deficit zdravotního pojištění 2026. Proč se nůžky rozevírají a co je zastaví">
  <defs>
    <style>
      .il-kicker { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; fill: #a05a08; }
      .il-title { font-family: 'Source Serif 4', Georgia, serif; font-weight: 700; fill: #1f1a14; letter-spacing: -0.4px; }
      .il-brand { font-family: 'Source Serif 4', Georgia, serif; font-size: 20px; font-weight: 700; fill: #1f1a14; }
      .il-date { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; fill: #5f574e; }
      .il-caption { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #5f574e; font-style: italic; }
      
    @media (max-width: 768px), (prefers-reduced-motion: no-preference) {
      .illu-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: illuDrawIn 1.5s ease-out 0.3s forwards; }
      .illu-line-1 { animation-delay: 0.5s; }
      .illu-line-2 { animation-delay: 0.3s; }
      .illu-gap { opacity: 0; animation: illuFade 0.8s ease-out 1.2s forwards; }
      .illu-dot { transform-origin: center; animation: illuPop 0.4s cubic-bezier(.34,1.56,.64,1) both; }
      .illu-dot-1 { animation-delay: 1.6s; }
      .illu-dot-2 { animation-delay: 1.4s; }
      .illu-gap-label { opacity: 0; animation: illuFade 0.6s ease-out 2.0s forwards; }
      .illu-label-grp { opacity: 0; animation: illuFade 0.5s ease-out 1.8s forwards; }
      .illu-coin { transform-origin: center; opacity: 0; animation: illuPop 0.4s cubic-bezier(.34,1.56,.64,1) both; }
      .illu-coin-0 { animation-delay: 0.3s; }
      .illu-coin-1 { animation-delay: 0.37s; }
      .illu-coin-2 { animation-delay: 0.44s; }
      .illu-coin-3 { animation-delay: 0.51s; }
      .illu-coin-4 { animation-delay: 0.5800000000000001s; }
      .illu-coin-5 { animation-delay: 0.65s; }
      .illu-coin-6 { animation-delay: 0.72s; }
      .illu-coin-7 { animation-delay: 0.79s; }
      .illu-coin-8 { animation-delay: 0.8600000000000001s; }
      .illu-coin-9 { animation-delay: 0.9300000000000002s; }
      .illu-coin-10 { animation-delay: 1s; }
      .illu-coin-11 { animation-delay: 1.07s; }
      .illu-coin-12 { animation-delay: 1.1400000000000001s; }
      .illu-coin-13 { animation-delay: 1.2100000000000002s; }
      .illu-check { stroke-dasharray: 300; stroke-dashoffset: 300; animation: illuDrawIn 0.8s ease-out 0.5s forwards; }
      .illu-pulse-line { stroke-dasharray: 1500; stroke-dashoffset: 1500; animation: illuDrawIn 1.8s ease-out 0.3s forwards; }
      .illu-pulse-peak { transform-origin: center; animation: illuPop 0.4s ease-out 1.6s both, pulse 2s ease-in-out 2s infinite; }
      .illu-net-line { stroke-dasharray: 200; stroke-dashoffset: 200; animation: illuDrawIn 0.6s ease-out forwards; }
      .illu-net-line-0 { animation-delay: 0.4s; }
      .illu-net-line-1 { animation-delay: 0.5s; }
      .illu-net-line-2 { animation-delay: 0.6000000000000001s; }
      .illu-net-line-3 { animation-delay: 0.7000000000000001s; }
      .illu-net-line-4 { animation-delay: 0.8s; }
      .illu-net-line-5 { animation-delay: 0.9s; }
      .illu-net-node { transform-origin: center; opacity: 0; animation: illuPop 0.4s ease-out both; }
      .illu-net-node-0 { animation-delay: 0.9s; }
      .illu-net-node-1 { animation-delay: 0.98s; }
      .illu-net-node-2 { animation-delay: 1.06s; }
      .illu-net-node-3 { animation-delay: 1.1400000000000001s; }
      .illu-net-node-4 { animation-delay: 1.22s; }
      .illu-net-node-5 { animation-delay: 1.3s; }
      .illu-net-hub { animation: illuPop 0.5s cubic-bezier(.34,1.56,.64,1) 0.3s both; }
      .illu-block { transform-origin: center; opacity: 0; animation: illuPop 0.45s cubic-bezier(.34,1.56,.64,1) both; }
      .illu-block-0-0 { animation-delay: 0.4s; }
      .illu-block-1-0 { animation-delay: 0.48000000000000004s; }
      .illu-block-1-1 { animation-delay: 0.56s; }
      .illu-block-2-0 { animation-delay: 0.64s; }
      .illu-block-2-1 { animation-delay: 0.72s; }
      .illu-block-2-2 { animation-delay: 0.8s; }
      .illu-trend-line { stroke-dasharray: 800; stroke-dashoffset: 800; animation: illuDrawIn 1.4s ease-out 0.3s forwards; }
      .illu-trend-arrow { stroke-dasharray: 60; stroke-dashoffset: 60; animation: illuDrawIn 0.4s ease-out 1.5s forwards; }
      .illu-trend-dot { transform-origin: center; opacity: 0; animation: illuPop 0.35s cubic-bezier(.34,1.56,.64,1) both; }
      .illu-trend-dot-1 { animation-delay: 0.6s; }
      .illu-trend-dot-2 { animation-delay: 0.9s; }
      .illu-trend-dot-3 { animation-delay: 1.2s; }
      .illu-ring { transform-origin: center; opacity: 0; animation: illuFadeRing 0.6s ease-out both; }
      .illu-ring-0 { animation-delay: 0.5s; }
      .illu-ring-1 { animation-delay: 0.4s; }
      .illu-ring-2 { animation-delay: 0.3s; }
      .illu-ring-3 { animation-delay: 0.2s; }
      .illu-ring-4 { animation-delay: 0.1s; }
      .il-headline { animation: illuSlideIn 0.7s ease-out 0.5s both; }
    }
    @media (prefers-reduced-motion: reduce) {
      .illu-line, .illu-gap, .illu-dot, .illu-gap-label, .illu-label-grp, .illu-coin, .illu-check, .illu-pulse-line, .illu-pulse-peak, .illu-net-line, .illu-net-node, .illu-net-hub, .illu-block, .illu-trend-line, .illu-trend-arrow, .illu-trend-dot, .illu-ring, .il-headline { animation: none !important; opacity: 1; }
      .illu-line, .illu-check, .illu-pulse-line, .illu-net-line, .illu-trend-line, .illu-trend-arrow { stroke-dashoffset: 0; }
    }
    @keyframes illuDrawIn { to { stroke-dashoffset: 0; } }
    @keyframes illuFade { to { opacity: 1; } }
    @keyframes illuFadeRing { to { opacity: 1; transform: scale(1); } from { opacity: 0; transform: scale(0.85); } }
    @keyframes illuPop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes illuSlideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); opacity: 0.6; } }
  
    </style>
    <pattern id="il-grain" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="40" r="0.7" fill="#1f1a14" opacity="0.05"/>
      <circle cx="100" cy="90" r="0.6" fill="#1f1a14" opacity="0.04"/>
      <circle cx="60" cy="130" r="0.8" fill="#1f1a14" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Cream background -->
  <rect width="1200" height="630" fill="#fbf8f1"/>
  <rect width="1200" height="630" fill="url(#il-grain)"/>

  <!-- Top thin rule -->
  <line x1="80" y1="60" x2="1120" y2="60" stroke="#1f1a14" stroke-width="1.5"/>

  <!-- Kicker (top-left) -->
  <g>
    <circle cx="62" cy="84" r="5" fill="#a05a08"/>
    <text x="80" y="92" class="il-kicker">
      <tspan>Financování</tspan>
      <tspan dx="14" fill="#5f574e" letter-spacing="0.1em" font-weight="500">#30</tspan>
    </text>
  </g>

  <!-- ILUSTRACE (levá polovina) -->
  <g class="illu illu-divergence">
    <!-- Backdrop -->
    <rect x="60" y="120" width="540" height="390" fill="#a05a08" fill-opacity="0.04" rx="6"/>
    <line x1="60" y1="217.5" x2="600" y2="217.5" stroke="#1f1a14" stroke-opacity="0.05"/><line x1="60" y1="315" x2="600" y2="315" stroke="#1f1a14" stroke-opacity="0.05"/><line x1="60" y1="412.5" x2="600" y2="412.5" stroke="#1f1a14" stroke-opacity="0.05"/>

    <!-- Gap fill (deficit zone) -->
    <path class="illu-gap" d="M 60 424.2
                    C 222 424.2, 330 295.5, 573 151.2
                    L 573 244.8
                    C 384 334.5, 249 404.7, 60 424.2
                    Z" fill="#a05a08" fill-opacity="0.18"/>

    <!-- Línie 2 (pomalejší, šedá, kreslí se první) -->
    <path class="illu-line illu-line-2" d="M 60 424.2
                  C 249 404.7,
                    384 334.5,
                    573 244.8"
          fill="none" stroke="#1f1a14" stroke-opacity="0.55"
          stroke-width="3" stroke-linecap="round"/>

    <!-- Línie 1 (rychlejší, accent, kreslí se druhá) -->
    <path class="illu-line illu-line-1" d="M 60 424.2
                  C 222 424.2,
                    330 295.5,
                    573 151.2"
          fill="none" stroke="#a05a08" stroke-width="5" stroke-linecap="round"/>

    <!-- End-point dots -->
    <circle class="illu-dot illu-dot-1" cx="573" cy="151.2" r="7" fill="#a05a08"/>
    <circle class="illu-dot illu-dot-2" cx="573" cy="244.8" r="6" fill="#1f1a14" opacity="0.6"/>

    <!-- Inline labels u koncových bodů -->
    <g class="illu-label-grp illu-label-grp-1">
      <text x="561" y="137.2" text-anchor="end"
            font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#a05a08">
        Výdaje +6,4 %
      </text>
    </g>
    <g class="illu-label-grp illu-label-grp-2">
      <text x="561" y="268.8" text-anchor="end"
            font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#1f1a14" opacity="0.7">
        Příjmy +5,5 %
      </text>
    </g>

    <!-- Annotation šipka pro "nůžky" -->
    <g class="illu-gap-label">
      <line x1="330" y1="315" x2="330" y2="354"
            stroke="#a05a08" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
      <text x="330" y="412.5" text-anchor="middle"
            font-family="'Inter', sans-serif" font-size="11" font-weight="700"
            letter-spacing="0.12em" text-transform="uppercase" fill="#a05a08" opacity="0.85">
        nůžky
      </text>
    </g>
  </g>

  <!-- Headline (pravá polovina) -->
  <g class="il-headline">
    <text class="il-title" x="680" y="215" font-size="30">
      <tspan x="680" dy="0">Strukturální deficit</tspan><tspan x="680" dy="32">zdravotního</tspan><tspan x="680" dy="32">pojištění 2026. Proč</tspan><tspan x="680" dy="32">se nůžky rozevírají</tspan><tspan x="680" dy="32">a co je zastaví</tspan>
    </text>
    <line x1="680" y1="371"
          x2="780" y2="371"
          stroke="#a05a08" stroke-width="4" stroke-linecap="round"/>
    <text x="680" y="401" class="il-caption">Tempo růstu výdajů na péči vs příjmů z pojistného (meziročně)</text>
  </g>

  <!-- Bottom: brand + date -->
  <g>
    <line x1="80" y1="570" x2="1120" y2="570" stroke="rgba(31,26,20,0.13)" stroke-width="1"/>
    <text x="80" y="602" class="il-brand">
      <tspan font-weight="700">HSPA</tspan> <tspan font-style="italic" font-weight="400">monitor</tspan>
    </text>
    <text x="1120" y="602" text-anchor="end" class="il-date">8. května 2026</text>
  </g>
</svg>
