name: Refresh HSPA data

on:
  schedule:
    # Každý den v 6:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      bust_cache:
        description: 'Vynutit přenačtení (ignorovat cache)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh:
    name: Ingest & publish
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 05_M1_Starter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 05_M1_Starter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run ingest pipeline
        env:
          BUST_CACHE: ${{ inputs.bust_cache || 'false' }}
        run: npm run ingest
        # V M1 jsou fetchery stuby — pipeline proběhne bez chyb.
        # V M2–M4 budou fetchery implementovány a data se skutečně přenačtou.

      - name: Validate data contract
        run: npm run validate:data

      - name: Commit updated data (pokud se změnila)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indicators.json data/regions.json
          if git diff --staged --quiet; then
            echo "Žádná změna dat — commit přeskočen."
          else
            git commit -m "chore(data): automated refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
