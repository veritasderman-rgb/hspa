name: Refresh data

# Spouští se každý den v 06:00 UTC. Provede ingest pipeline,
# validuje výsledek a commitne změny v data/ (+ nový snapshot)
# zpět do repa. Vercel se po pushi sám rebuildne.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:  # umožní manuální spuštění z GitHub UI

permissions:
  contents: write  # potřeba pro commit do data/

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: 05_M1_Starter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 05_M1_Starter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ingest pipeline
        run: npm run ingest

      - name: Validate data contract
        run: npm run validate:data

      - name: Run tests
        run: npm test

      - name: Commit refreshed data (if changed)
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 05_M1_Starter/data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d)"
            git push
          fi
