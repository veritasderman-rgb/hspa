name: Refresh data

# Spouští se každý den v 06:00 UTC. Provede ingest pipeline,
# validuje výsledek a commitne změny v data/ (+ nový snapshot)
# zpět do repa. Vercel se po pushi sám rebuildne.
#
# Po ingestu spustí verify:freshness, který fail-uje pokud
# poměr indikátorů s `origin: live` klesne pod MIN_LIVE_RATIO.
# Bez toho by tichý fallback na seed maskoval rozbité fetchery.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:  # umožní manuální spuštění z GitHub UI

permissions:
  contents: write  # potřeba pro commit do data/
  issues: write    # potřeba pro automatické otevření issue při selhání

env:
  # Práh pro verify:freshness — pokud méně indikátorů než tento podíl
  # má origin=live, workflow failne a data se NEpushne.
  # Aktuálně je 0.0, protože všechny fetchery selhávají; postupně zvedat.
  # Cíl po opravě fetcherů: 0.5–0.8.
  MIN_LIVE_RATIO: '0.0'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: 05_M1_Starter
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 05_M1_Starter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ingest pipeline
        id: ingest
        run: |
          set -o pipefail
          npm run ingest 2>&1 | tee /tmp/ingest.log

      - name: Validate data contract
        id: validate
        run: |
          set -o pipefail
          npm run validate:data 2>&1 | tee /tmp/validate.log

      - name: Run tests
        id: tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/tests.log

      - name: Verify data freshness
        id: freshness
        run: |
          set -o pipefail
          # Vždy vygeneruj report, gating zařídí --min-live-ratio.
          npm run verify:freshness -- --min-live-ratio=${MIN_LIVE_RATIO} 2>&1 | tee /tmp/freshness.txt
          {
            echo 'report<<EOF'
            cat /tmp/freshness.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "::group::Last 80 lines of ingest log"
          tail -n 80 /tmp/ingest.log 2>/dev/null || echo "no ingest log"
          echo "::endgroup::"
          echo "::group::Last 80 lines of validate log"
          tail -n 80 /tmp/validate.log 2>/dev/null || echo "no validate log"
          echo "::endgroup::"
          echo "::group::Last 80 lines of tests log"
          tail -n 80 /tmp/tests.log 2>/dev/null || echo "no tests log"
          echo "::endgroup::"
          echo "::group::Last 80 lines of freshness log"
          tail -n 80 /tmp/freshness.txt 2>/dev/null || echo "no freshness log"
          echo "::endgroup::"

      - name: Commit refreshed data (if changed)
        if: success()
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 05_M1_Starter/data/
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "data: refresh $(date -u +%Y-%m-%d)"

          # Push s retry + rebase při race condition: pokud mezi
          # checkoutem a pushem došel do main jiný commit (běžné, když
          # cron běží paralelně s mergem PR), zkus rebasenout na nejnovější
          # origin/main a push opakuj. Max 5 pokusů.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed (likely race with concurrent push). Rebasing on origin/main..."
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase has conflicts — aborting and giving up."
              git rebase --abort || true
              exit 1
            fi
            # Krátká pauza, kdyby konkurenční push běžel ještě
            sleep $((attempt * 2))
          done
          echo "Push failed after 5 attempts."
          exit 1

      - name: Open or update freshness alert issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Data refresh failure — fetchery selhávají';
            const body = [
              '**Automatický cron `refresh.yml` selhal při kontrole čerstvosti dat.**',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Datum: ${new Date().toISOString()}`,
              '',
              'Tichý fallback na seed byl zachycen `verify:freshness`. Data NEbyla pushnuta do `main`.',
              '',
              '## Co s tím',
              '1. Otevřít run log a zjistit, který fetcher (ČSÚ/Eurostat/OECD/ÚZIS) selhává.',
              '2. Pokud upstream API vrací 404/400, ověřit aktuální URL/dimenze v `PLAN_AUTOMATICKY_INGEST.md`.',
              '3. Po opravě fetcheru spustit `workflow_dispatch` pro re-run.',
              '',
              '_Issue je automaticky aktualizován při dalším selhání._'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'freshness-alert',
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Další selhání: ${new Date().toISOString()} · run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['freshness-alert', 'bug'],
              });
            }
