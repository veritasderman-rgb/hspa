name: Visual + a11y regression

# Spouští Playwright visual snapshots + axe-core a11y scan napříč 3 viewporty.
# Failuje pokud:
#  - vizuální regrese > 1 % pixelů (toHaveScreenshot maxDiffPixelRatio)
#  - nová critical/serious axe violation
#
# AKTIVACE: tato workflow je opt-in (workflow_dispatch only) dokud vlastník
# projektu jednorázově nevygeneruje baseline snapshots lokálně a necommituje
# devDeps + package-lock.json:
#
#   cd 05_M1_Starter
#   npm install --save-dev @playwright/test @axe-core/playwright
#   npx playwright install --with-deps chromium
#   npx playwright test --config=playwright.config.js --update-snapshots
#   git add package.json package-lock.json tests/e2e/*-snapshots && git commit
#
# Po tomto kroku odkomentovat `pull_request:` trigger níže pro auto-spuštění
# na každý PR.

on:
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - '05_M1_Starter/**'
  #     - '.github/workflows/visual-a11y.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: 05_M1_Starter

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 05_M1_Starter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual + a11y tests
        run: npx playwright test --config=playwright.config.js
        env:
          CI: 'true'

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: 05_M1_Starter/playwright-report/
          retention-days: 14
