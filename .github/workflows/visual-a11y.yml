name: Visual + a11y regression

# Spouští Playwright visual snapshots + axe-core a11y scan napříč 3 viewporty.
# Failuje pokud:
#  - vizuální regrese > 1 % pixelů (toHaveScreenshot maxDiffPixelRatio)
#  - nová critical/serious axe violation
#
# Aktualizace baseline po vědomé změně:
#   npm run test:e2e -- --update-snapshots
#   git add tests/e2e/visual.spec.js-snapshots && git commit

on:
  pull_request:
    branches: [main]
    paths:
      - '05_M1_Starter/**'
      - '.github/workflows/visual-a11y.yml'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: 05_M1_Starter

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 05_M1_Starter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual + a11y tests
        run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: 05_M1_Starter/playwright-report/
          retention-days: 14
